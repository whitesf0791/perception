<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ConvCards" />
  <title>Conversation Cards</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
<div id="app">
  <header>
    <span class="app-title">Conversation Cards</span>
    <div class="header-actions">
      <button class="icon-btn" id="btn-favs" aria-label="Saved">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-filter" aria-label="Filter">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M7 8h10M11 12h2M9 16h6"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Card view -->
  <div class="view active" id="card-view">
    <div class="pool-info" id="pool-info"></div>
    <div class="card-area" id="card-area">
      <!-- card injected by JS -->
    </div>
    <div class="card-actions" id="card-actions">
      <button class="action-btn save-btn" id="btn-save">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        Save
      </button>
      <button class="action-btn next-btn" id="btn-next">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
        </svg>
        Next
      </button>
    </div>
  </div>

  <!-- Favorites view -->
  <div class="view" id="favorites-view">
    <h2>Saved Questions</h2>
    <div class="favorites-list" id="favorites-list"></div>
  </div>
</div>

<!-- Filter sheet -->
<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="bottom-sheet" id="filter-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Filter Questions</div>

  <div class="filter-section">
    <div class="filter-label">Depth</div>
    <div class="chip-group" id="chips-depth">
      <button class="chip d1 active" data-val="1">Light</button>
      <button class="chip d2 active" data-val="2">Moderate</button>
      <button class="chip d3 active" data-val="3">Deep</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Setting</div>
    <div class="setting-group" id="chips-setting">
      <button class="setting-chip active" data-val="any">Any</button>
      <button class="setting-chip" data-val="one_on_one">One-on-one</button>
      <button class="setting-chip" data-val="group">Group-friendly</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Category</div>
    <div class="chip-group" id="chips-category">
      <button class="chip active" data-val="childhood">Childhood</button>
      <button class="chip active" data-val="travel">Travel</button>
      <button class="chip active" data-val="work_ambition">Work</button>
      <button class="chip active" data-val="values_beliefs">Values</button>
      <button class="chip active" data-val="relationships">Relationships</button>
      <button class="chip active" data-val="hypothetical">Hypothetical</button>
      <button class="chip active" data-val="humor">Humor</button>
      <button class="chip active" data-val="food_lifestyle">Food</button>
      <button class="chip active" data-val="pop_culture">Pop Culture</button>
      <button class="chip active" data-val="personal_growth">Growth</button>
      <button class="chip active" data-val="dreams_future">Dreams</button>
      <button class="chip active" data-val="random">Random</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label" id="type-label">
      Type
      <svg class="collapse-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
    <div class="chip-group hidden" id="chips-type">
      <button class="chip active" data-val="memory">Memory</button>
      <button class="chip active" data-val="reveal">Reveal</button>
      <button class="chip active" data-val="opinion">Opinion</button>
      <button class="chip active" data-val="hypothetical">Hypothetical</button>
      <button class="chip active" data-val="would_you_rather">Would You Rather</button>
      <button class="chip active" data-val="preference">Preference</button>
      <button class="chip active" data-val="ranking">Ranking</button>
    </div>
  </div>

  <div class="sheet-footer">
    <button class="btn-reset-filters" id="btn-reset-filters">Reset</button>
    <button class="btn-apply" id="btn-apply-filters">Apply</button>
  </div>
</div>

<script type="module">
import { questions } from '/data/questions.js';

// ── Storage keys
const STORAGE_FILTERS = 'conv_card_filters';
const STORAGE_FAVS    = 'conv_card_favorites';

const ALL_CATEGORIES = ['childhood','travel','work_ambition','values_beliefs','relationships','hypothetical','humor','food_lifestyle','pop_culture','personal_growth','dreams_future','random'];
const ALL_TYPES      = ['memory','reveal','opinion','hypothetical','would_you_rather','preference','ranking'];

const DEFAULT_FILTERS = {
  categories: [...ALL_CATEGORIES],
  depths:     [1, 2, 3],
  setting:    'any',
  types:      [...ALL_TYPES],
};

// ── State
let filters    = loadFilters();
let favorites  = loadFavs();
let pool       = [];
let seen       = [];
let current    = null;
let currentView = 'cards';

// ── DOM refs
const cardArea      = document.getElementById('card-area');
const poolInfo      = document.getElementById('pool-info');
const cardActions   = document.getElementById('card-actions');
const btnSave       = document.getElementById('btn-save');
const btnNext       = document.getElementById('btn-next');
const btnFavs       = document.getElementById('btn-favs');
const btnFilter     = document.getElementById('btn-filter');
const favsList      = document.getElementById('favorites-list');
const sheetOverlay  = document.getElementById('sheet-overlay');
const filterSheet   = document.getElementById('filter-sheet');
const btnApply      = document.getElementById('btn-apply-filters');
const btnReset      = document.getElementById('btn-reset-filters');
const typeLabel     = document.getElementById('type-label');
const chipsType     = document.getElementById('chips-type');

// ── Init
function init() {
  applyFiltersToChips();
  buildPool();
  drawCard();
  registerEvents();
  syncFavBtn();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
}

// ── Filter persistence
function loadFilters() {
  try {
    const raw = localStorage.getItem(STORAGE_FILTERS);
    if (raw) {
      const f = JSON.parse(raw);
      return {
        categories: f.categories || [...ALL_CATEGORIES],
        depths:     (f.depths || [1,2,3]).map(Number),
        setting:    f.setting || 'any',
        types:      f.types   || [...ALL_TYPES],
      };
    }
  } catch(e) {}
  return { ...DEFAULT_FILTERS };
}

function saveFilters() {
  localStorage.setItem(STORAGE_FILTERS, JSON.stringify(filters));
}

// ── Favorites persistence
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_FAVS)) || []; }
  catch(e) { return []; }
}

function saveFavs() {
  localStorage.setItem(STORAGE_FAVS, JSON.stringify(favorites));
}

// ── Pool management
function buildPool() {
  pool = questions.filter(q => {
    if (!filters.categories.includes(q.category)) return false;
    if (!filters.depths.includes(q.depth)) return false;
    if (!filters.types.includes(q.type)) return false;
    if (filters.setting === 'one_on_one') {
      // show only one_on_one questions
      // (both + one_on_one are fine for one_on_one setting)
      return true;
    }
    if (filters.setting === 'group') {
      return q.setting === 'both';
    }
    return true; // 'any'
  });
  seen = [];
}

function pickNext() {
  const unseen = pool.filter(q => !seen.includes(q.id));
  if (!unseen.length) return null;
  return unseen[Math.floor(Math.random() * unseen.length)];
}

// ── Render card
function drawCard(animate = false) {
  const q = pickNext();
  current = q;

  if (!q) {
    renderEmpty();
    return;
  }

  const isSaved = favorites.includes(q.id);
  const depthLabels = { 1: 'Light', 2: 'Moderate', 3: 'Deep' };
  const catLabel = q.category.replace(/_/g, ' ');

  const card = document.createElement('div');
  card.className = 'card' + (animate ? ' card-in' : '');
  card.innerHTML = `
    <div class="depth-badge">
      <div class="depth-dot d${q.depth}"></div>
      <span class="depth-label d${q.depth}-label">${depthLabels[q.depth]}</span>
      <span class="category-tag">${catLabel}</span>
    </div>
    <div class="question-text">${q.question}</div>
    <div class="card-footer">
      <span class="hint-text">tap or swipe →</span>
      <div class="save-indicator ${isSaved ? 'saved-icon' : ''}">
        <svg xmlns="http://www.w3.org/2000/svg" fill="${isSaved ? 'currentColor' : 'none'}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
      </div>
    </div>
    <div class="swipe-hint left">♥ Save</div>
    <div class="swipe-hint right">Next →</div>
  `;

  cardArea.innerHTML = '';
  cardArea.appendChild(card);

  const unseen = pool.filter(q2 => !seen.includes(q2.id));
  poolInfo.textContent = `${unseen.length} of ${pool.length} remaining`;
  cardActions.style.display = '';

  setupCardInteraction(card);
  syncSaveBtn(isSaved);
}

function renderEmpty() {
  cardArea.innerHTML = `
    <div class="empty-card">
      <p>You've seen all ${pool.length} question${pool.length === 1 ? '' : 's'} in this filter.<br>Reset to go again or change your filters.</p>
      <button class="btn-reset" id="btn-pool-reset">Start Over</button>
    </div>
  `;
  poolInfo.textContent = `${pool.length} question${pool.length === 1 ? '' : 's'} in filter`;
  cardActions.style.display = 'none';
  document.getElementById('btn-pool-reset').addEventListener('click', () => {
    seen = [];
    drawCard(true);
  });
}

function syncSaveBtn(isSaved) {
  btnSave.style.color = isSaved ? 'var(--accent)' : '';
}

function syncFavBtn() {
  btnFavs.classList.toggle('active', currentView === 'favorites');
}

// ── Card swipe/tap interaction
function setupCardInteraction(card) {
  let startX = 0, startY = 0, dragging = false, moved = false;
  let longPressTimer = null;

  const LONG_PRESS_MS = 500;
  const SWIPE_THRESHOLD = 60;
  const leftHint  = card.querySelector('.swipe-hint.left');
  const rightHint = card.querySelector('.swipe-hint.right');

  function onStart(x, y) {
    startX = x; startY = y;
    dragging = true; moved = false;
    longPressTimer = setTimeout(() => {
      if (!moved) doSave();
    }, LONG_PRESS_MS);
  }

  function onMove(x, y) {
    if (!dragging) return;
    const dx = x - startX;
    const dy = Math.abs(y - startY);
    if (Math.abs(dx) > 8 || dy > 8) moved = true;
    if (Math.abs(dx) > 8) {
      clearTimeout(longPressTimer);
      card.style.transform = `translateX(${dx * 0.4}px) rotate(${dx * 0.03}deg)`;
      if (dx < 0) {
        leftHint.style.opacity = Math.min(1, Math.abs(dx) / SWIPE_THRESHOLD);
        rightHint.style.opacity = 0;
      } else {
        rightHint.style.opacity = Math.min(1, dx / SWIPE_THRESHOLD);
        leftHint.style.opacity = 0;
      }
    }
  }

  function onEnd(x) {
    if (!dragging) return;
    dragging = false;
    clearTimeout(longPressTimer);
    const dx = x - startX;

    if (Math.abs(dx) > SWIPE_THRESHOLD) {
      if (dx < 0) {
        animateCard(card, 'swipe-left', doSave);
      } else {
        animateCard(card, 'swipe-right', doNext);
      }
    } else if (!moved) {
      card.style.transform = '';
      leftHint.style.opacity = 0;
      rightHint.style.opacity = 0;
      doNext();
    } else {
      card.style.transform = '';
      leftHint.style.opacity = 0;
      rightHint.style.opacity = 0;
    }
  }

  card.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
  card.addEventListener('mousemove',  e => { if (dragging) onMove(e.clientX, e.clientY); });
  card.addEventListener('mouseup',    e => onEnd(e.clientX));
  card.addEventListener('mouseleave', e => { if (dragging) onEnd(e.clientX); });

  card.addEventListener('touchstart', e => { const t = e.touches[0]; onStart(t.clientX, t.clientY); }, { passive: true });
  card.addEventListener('touchmove',  e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: true });
  card.addEventListener('touchend',   e => { const t = e.changedTouches[0]; onEnd(t.clientX); });
}

function animateCard(card, cls, callback) {
  card.style.transform = '';
  card.classList.add(cls);
  setTimeout(() => {
    if (callback) callback();
  }, 280);
}

// ── Actions
function doNext() {
  if (!current) return;
  seen.push(current.id);
  const card = cardArea.querySelector('.card');
  if (card) {
    animateCard(card, 'swipe-right', () => drawCard(true));
  } else {
    drawCard(true);
  }
}

function doSave() {
  if (!current) return;
  const id = current.id;
  if (!favorites.includes(id)) {
    favorites.push(id);
    saveFavs();
    // flash saved indicator
    const indicator = cardArea.querySelector('.save-indicator');
    if (indicator) {
      indicator.style.color = 'var(--accent)';
      indicator.querySelector('svg').setAttribute('fill', 'currentColor');
    }
    syncSaveBtn(true);
  }
  seen.push(id);
  const card = cardArea.querySelector('.card');
  if (card) {
    animateCard(card, 'swipe-left', () => drawCard(true));
  } else {
    drawCard(true);
  }
}

// ── Navigation
function showView(name) {
  currentView = name;
  document.getElementById('card-view').classList.toggle('active', name === 'cards');
  document.getElementById('favorites-view').classList.toggle('active', name === 'favorites');
  syncFavBtn();
  if (name === 'favorites') renderFavorites();
}

btnFavs.addEventListener('click', () => {
  showView(currentView === 'favorites' ? 'cards' : 'favorites');
});

// ── Favorites view
function renderFavorites() {
  if (!favorites.length) {
    favsList.innerHTML = `
      <div class="empty-favs">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <p>No saved questions yet.<br>Long-press a card or swipe left to save it.</p>
      </div>`;
    return;
  }

  const savedQs = favorites.map(id => questions.find(q => q.id === id)).filter(Boolean);
  favsList.innerHTML = '';

  savedQs.forEach(q => {
    const item = document.createElement('div');
    item.className = 'fav-item';
    item.innerHTML = `
      <div class="fav-depth-dot d${q.depth} depth-dot"></div>
      <div class="fav-question">${q.question}</div>
      <button class="fav-remove" data-id="${q.id}" aria-label="Remove">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>`;
    item.querySelector('.fav-remove').addEventListener('click', (e) => {
      e.stopPropagation();
      const id = Number(e.currentTarget.dataset.id);
      favorites = favorites.filter(f => f !== id);
      saveFavs();
      renderFavorites();
    });
    favsList.appendChild(item);
  });
}

// ── Filter sheet
btnFilter.addEventListener('click', openSheet);
sheetOverlay.addEventListener('click', closeSheet);

function openSheet() {
  filterSheet.classList.add('open');
  sheetOverlay.classList.add('open');
}

function closeSheet() {
  filterSheet.classList.remove('open');
  sheetOverlay.classList.remove('open');
}

// type section collapse
typeLabel.addEventListener('click', () => {
  typeLabel.classList.toggle('collapsed');
  chipsType.classList.toggle('hidden');
});

// depth chips (multi-select)
document.getElementById('chips-depth').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  chip.classList.toggle('active');
});

// category chips (multi-select)
document.getElementById('chips-category').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  chip.classList.toggle('active');
});

// type chips (multi-select)
chipsType.addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  chip.classList.toggle('active');
});

// setting chips (single-select)
document.getElementById('chips-setting').addEventListener('click', e => {
  const chip = e.target.closest('.setting-chip');
  if (!chip) return;
  document.querySelectorAll('.setting-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
});

// apply filters
btnApply.addEventListener('click', () => {
  const activeDepths     = [...document.querySelectorAll('#chips-depth .chip.active')].map(c => Number(c.dataset.val));
  const activeCategories = [...document.querySelectorAll('#chips-category .chip.active')].map(c => c.dataset.val);
  const activeTypes      = [...document.querySelectorAll('#chips-type .chip.active')].map(c => c.dataset.val);
  const activeSetting    = document.querySelector('.setting-chip.active')?.dataset.val || 'any';

  filters = {
    depths:     activeDepths.length     ? activeDepths     : [1,2,3],
    categories: activeCategories.length ? activeCategories : [...ALL_CATEGORIES],
    types:      activeTypes.length      ? activeTypes      : [...ALL_TYPES],
    setting:    activeSetting,
  };
  saveFilters();
  buildPool();
  closeSheet();
  if (currentView === 'cards') drawCard(true);
});

// reset filters
btnReset.addEventListener('click', () => {
  filters = { ...DEFAULT_FILTERS, categories: [...ALL_CATEGORIES], types: [...ALL_TYPES] };
  applyFiltersToChips();
});

function applyFiltersToChips() {
  document.querySelectorAll('#chips-depth .chip').forEach(c => {
    c.classList.toggle('active', filters.depths.includes(Number(c.dataset.val)));
  });
  document.querySelectorAll('#chips-category .chip').forEach(c => {
    c.classList.toggle('active', filters.categories.includes(c.dataset.val));
  });
  document.querySelectorAll('#chips-type .chip').forEach(c => {
    c.classList.toggle('active', filters.types.includes(c.dataset.val));
  });
  document.querySelectorAll('.setting-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.val === filters.setting);
  });
}

// ── Bottom action buttons
btnNext.addEventListener('click', doNext);
btnSave.addEventListener('click', doSave);

// ── Kick off
init();
</script>
</body>
</html>
